name: Build ImmortalWrt (Xiaomi AX6)

on:
  repository_dispatch:
    types: [build_firmware]
  workflow_dispatch:
  # 如果需要定时自动触发，可以取消下面两行的注释（每周日凌晨2点编译）
  # schedule:
  #   - cron: 0 18 * * 0

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ax6.config
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /audio /var/lib/ghostscript
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/tools/ready-tools)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        mkdir -p /workdir
        sudo chown runner:runner /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 核心修改1：增加错误拦截，如果 make 返回非 0 状态码，直接停止后续步骤
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep -q '^CONFIG_TARGET_.*=y' .config

    - name: Check space usage
      if: (!cancelled())
      run: |
        df -hT

    # 核心修改2：在上传前，先筛选出真正的固件，过滤掉几KB的无用配置文件
    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env:UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/qualcommax/ipq807x
        rm -rf packages
        # 只保留常见的固件后缀，确保那几个几 KB 的清单文件不干扰视线
        mkdir -p $GITHUB_WORKSPACE/firmware
        cp -f *sysupgrade.bin *factory.bin *factory.img *ubi.img $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
        cd $GITHUB_WORKSPACE/firmware
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # 核心修改3：精确定位上传目录，且如果目录为空则报错提示
    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ImmortalWrt_AX6_Firmware
        path: ${{ env:FIRMWARE }}
        if-no-files-found: error # 如果优化路径后没找到固件，直接让这一步红标报错，而不是传 6KB 上去
